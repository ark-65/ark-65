name: Update README Cards

on:
  schedule:
    - cron: "35 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-cards
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Generate ngx-puzzle dark card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=zhongmiao-org&repo=ngx-puzzle&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=00F7F7&icon_color=00F7F7&text_color=FFFFFF&disable_animations=true
          path: assets/cards/project-ngx-puzzle-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ngx-puzzle light card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=zhongmiao-org&repo=ngx-puzzle&theme=default&hide_border=true&disable_animations=true
          path: assets/cards/project-ngx-puzzle-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate intercept-wave dark card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=zhongmiao-org&repo=intercept-wave&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=00F7F7&icon_color=00F7F7&text_color=FFFFFF&disable_animations=true
          path: assets/cards/project-intercept-wave-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate intercept-wave light card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=zhongmiao-org&repo=intercept-wave&theme=default&hide_border=true&disable_animations=true
          path: assets/cards/project-intercept-wave-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate intercept-wave-vscode dark card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=zhongmiao-org&repo=intercept-wave-vscode&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=00F7F7&icon_color=00F7F7&text_color=FFFFFF&disable_animations=true
          path: assets/cards/project-intercept-wave-vscode-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate intercept-wave-vscode light card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=zhongmiao-org&repo=intercept-wave-vscode&theme=default&hide_border=true&disable_animations=true
          path: assets/cards/project-intercept-wave-vscode-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages dark card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=ark-65&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=00F7F7&text_color=FFFFFF&hide=html,css&langs_count=8&disable_animations=true
          path: assets/cards/top-languages-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages light card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=ark-65&layout=compact&theme=default&hide_border=true&hide=html,css&langs_count=8&disable_animations=true
          path: assets/cards/top-languages-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub stats dark card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=ark-65&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&title_color=00F7F7&icon_color=00F7F7&text_color=FFFFFF&include_all_commits=true&disable_animations=true
          path: assets/cards/github-stats-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub stats light card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=ark-65&show_icons=true&theme=default&hide_border=true&include_all_commits=true&disable_animations=true
          path: assets/cards/github-stats-light.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Finalize static SVG cards
        run: python3 .github/scripts/finalize_readme_cards.py

      - name: Commit refreshed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cards/*.svg
          git commit -m "docs: refresh profile cards" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
