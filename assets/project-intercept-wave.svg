  <text x="82" y="73" fill="#9be7ee" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">JetBrains proxy and request interception</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="600">
    <rect x="28" y="106" width="82" height="30" rx="15" fill="#111827" stroke="#00f7f7" stroke-opacity="0.55"/>
