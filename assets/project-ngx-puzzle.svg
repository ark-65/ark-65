<svg xmlns="http://www.w3.org/2000/svg" width="430" height="170" viewBox="0 0 430 170" role="img" aria-labelledby="title desc">
  <title id="title">ngx-puzzle project card</title>
  <desc id="desc">Static project card for ngx-puzzle, an Angular drag-and-drop dashboard library.</desc>
  <defs>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#102a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#00f7f7"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="430" height="170" rx="18" fill="url(#card)"/>
  <rect x="1" y="1" width="428" height="168" rx="17" fill="none" stroke="#1f6f78" stroke-width="2"/>
  <rect x="0" y="0" width="430" height="5" rx="2.5" fill="url(#accent)"/>
  <circle cx="46" cy="48" r="22" fill="#dd0031" opacity="0.95"/>
  <path d="M46 28 66 40 63 72 46 82 29 72 26 40Z" fill="none" stroke="#ffffff" stroke-width="3"/>
